name: Notify Slack - New Social Media Drafts

on:
  push:
    branches: [main]
    paths:
      - 'social-media-posts/drafts/**.md'

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Find new draft and notify Slack
        env:
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK }}
        run: |
          python3 << 'EOF'
          import os, json, subprocess, urllib.request

          result = subprocess.run(
              ['git', 'diff', '--name-only', 'HEAD~1', 'HEAD', '--', 'social-media-posts/drafts/'],
              capture_output=True, text=True
          )
          files = [f for f in result.stdout.strip().split('\n') if f.endswith('.md') and f]

          if not files:
              print("No new draft files found")
              exit(0)

          with open(files[0], 'r') as f:
              content = f.read()

          payload = json.dumps({"text": content})
          req = urllib.request.Request(
              os.environ['SLACK_WEBHOOK'],
              data=payload.encode('utf-8'),
              headers={'Content-Type': 'application/json'}
          )
          with urllib.request.urlopen(req) as r:
              print(f"Slack notified: {r.status}")
          EOF
